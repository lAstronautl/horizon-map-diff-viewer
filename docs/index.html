<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1.0"/>
    <title>SS14 Map Diff Viewer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background: #1a1a1a;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        
        #map_container {
            width: 100%;
            height: 100%;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        
        #map_zoomable {
            transform-origin: 0 0;
            cursor: grab;
        }
        
        #map_zoomable:active {
            cursor: grabbing;
        }
        
        .compare-image {
            position: absolute;
            top: 0;
            left: 0;
            display: none;
            image-rendering: auto;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            pointer-events: none;
        }
        
        .compare-image.old {
            z-index: 1;
        }
        
        .compare-image.new {
            z-index: 2;
            clip-path: inset(0 0 0 50%);
        }
        
        #slider {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 999;
            cursor: ew-resize;
            width: 40px;
            height: 40px;
            background-color: #2196F3;
            opacity: 0.7;
            border-radius: 50%;
            display: none;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        
        #controls {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(40, 40, 40, 0.9);
            padding: 15px;
            border-radius: 8px;
            z-index: 1000;
            color: #CAE9FF;
            font-family: sans-serif;
            font-size: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(202, 233, 255, 0.2);
        }
        
        #controls h3 {
            margin-bottom: 10px;
            font-size: 16px;
            border-bottom: 1px solid rgba(202, 233, 255, 0.3);
            padding-bottom: 5px;
        }
        
        .control-group {
            margin-bottom: 12px;
        }
        
        .control-group label {
            display: block;
            margin-bottom: 5px;
        }
        
        .control-group input[type="number"] {
            width: 80px;
            background: #282828;
            border: 1px solid #555;
            color: #CAE9FF;
            padding: 5px;
            border-radius: 4px;
        }
        
        .control-group button {
            background: #2196F3;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin: 2px;
        }
        
        .control-group button:hover {
            background: #1976D2;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .pixel-inputs {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 5px;
            align-items: center;
        }
        
        .pixel-inputs label {
            margin: 0;
        }
    </style>
</head>
<body>
    <div id="map_container">
        <div id="map_zoomable">
            <img id="old-image" class="compare-image" src="">
            <img id="new-image" class="compare-image" src="">
            <div id="slider"></div>
        </div>
    </div>
    
    <div id="controls">
        <h3>Настройки</h3>
        
        <div class="control-group">
            <div class="checkbox-group">
                <input type="checkbox" id="center-map" checked>
                <label for="center-map">Центрировать карты</label>
            </div>
        </div>
        
        <div class="control-group">
            <label>Смещение новой карты (px):</label>
            <div class="pixel-inputs">
                <label>X:</label>
                <input type="number" id="new-offset-x" value="0" step="32">
                <label>Y:</label>
                <input type="number" id="new-offset-y" value="0" step="32">
            </div>
        </div>

        <div class="control-group">
            <label>Смещение старой карты (px):</label>
            <div class="pixel-inputs">
                <label>X:</label>
                <input type="number" id="old-offset-x" value="0" step="32">
                <label>Y:</label>
                <input type="number" id="old-offset-y" value="0" step="32">
            </div>
        </div>

        <div class="control-group">
            <button id="apply-offset" style="width: 100%;">Применить</button>
            <button id="reset-offset" style="width: 100%;">Сбросить</button>
        </div>
        
        <div class="control-group">
            <label>Зум:</label>
            <button id="zoom-in">+</button>
            <button id="zoom-out">−</button>
            <button id="reset-zoom" style="width: 100%; margin-top: 5px;">Сбросить зум</button>
        </div>

        <div class="control-group">
            <button id="reset-slider" style="width: 100%;">Сбросить слайдер</button>
        </div>
    </div>

    <script type="text/javascript" src="scripts/diff-viewer.js"></script>
</body>
</html>
