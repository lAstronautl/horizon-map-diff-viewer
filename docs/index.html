<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1.0"/>
    <title>SS14 Map Diff Viewer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #1a1a1a;
            color: #CAE9FF;
            font-family: sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 40px;
        }

        .selection-group {
            background: rgba(40, 40, 40, 0.9);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid rgba(202, 233, 255, 0.2);
        }

        .selection-group h2 {
            font-size: 1.2em;
            margin-bottom: 15px;
            color: #2196F3;
        }

        .map-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        .map-card.old-select {
            border-color: #FF9800;
            background: #e65100;
        }

        .map-card.new-select {
            border-color: #4CAF50;
            background: #1b5e20;
        }

        .map-card {
            background: #282828;
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .map-card:hover {
            border-color: #2196F3;
            background: #323232;
        }

        .map-card.selected {
            border-color: #4CAF50;
            background: #1b5e20;
        }

        .map-card img {
            width: 100%;
            height: 100px;
            object-fit: contain;
            background: #1a1a1a;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .map-card .name {
            font-weight: bold;
            text-align: center;
        }

        .actions {
            text-align: center;
            margin-top: 30px;
        }

        .actions button {
            background: #2196F3;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            margin: 0 10px;
        }

        .actions button:hover {
            background: #1976D2;
        }

        .actions button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .selected-info {
            text-align: center;
            margin-top: 15px;
            color: #888;
        }

        .selected-info span {
            color: #4CAF50;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Map Diff Viewer</h1>

        <div class="selection-group">
            <h2>Select Map</h2>
            <div class="map-grid" id="maps-container"></div>
            <p class="selected-info" id="selection-info">
                Select: <span id="old-selected">none</span> |
                <span id="new-selected">none</span>
            </p>
        </div>

        <div class="actions">
            <button id="compare-btn" disabled>Apply</button>
        </div>
    </div>

    <script>
        const maps = [
            { id: 'Cluster', name: 'Cluster', image: 'maps/Cluster.png' },
            { id: 'CorvaxCluster', name: 'Corvax Cluster', image: 'maps/CorvaxCluster.png' },
            { id: 'OldCluster', name: 'Old Cluster', image: 'maps/OldCluster.png' }
        ];

        let selectedOld = null;
        let selectedNew = null;

        function createMapCard(map) {
            const card = document.createElement('div');
            card.className = 'map-card';
            card.dataset.mapId = map.id;

            card.innerHTML = `
                <img src="${map.image}" alt="${map.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22100%22><rect fill=%22%23333%22 width=%22200%22 height=%22100%22/><text fill=%22%23666%22 x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22>Preview</text></svg>'">
                <div class="name">${map.name}</div>
            `;

            card.addEventListener('click', () => handleCardClick(map));
            return card;
        }

        function handleCardClick(map) {
            if (!selectedOld || (selectedOld && selectedNew)) {
                selectedOld = map;
                selectedNew = null;
            } else if (selectedOld && !selectedNew && selectedOld.id !== map.id) {
                selectedNew = map;
            } else if (selectedOld.id === map.id) {
                selectedOld = null;
            } else if (selectedNew && selectedNew.id === map.id) {
                selectedNew = null;
            }
            updateSelection();
        }

        function updateSelection() {
            document.querySelectorAll('.map-card').forEach(c => {
                c.classList.remove('old-select', 'new-select');
            });

            if (selectedOld) {
                const oldCard = document.querySelector(`.map-card[data-map-id="${selectedOld.id}"]`);
                if (oldCard) oldCard.classList.add('old-select');
            }
            if (selectedNew) {
                const newCard = document.querySelector(`.map-card[data-map-id="${selectedNew.id}"]`);
                if (newCard) newCard.classList.add('new-select');
            }

            document.querySelector('#old-selected').textContent = selectedOld ? selectedOld.name : 'none';
            document.querySelector('#new-selected').textContent = selectedNew ? selectedNew.name : 'none';

            updateCompareButton();
        }

        function updateCompareButton() {
            const btn = document.getElementById('compare-btn');
            btn.disabled = !(selectedOld && selectedNew);
        }

        function startCompare() {
            if (selectedOld && selectedNew) {
                window.location.href = `diff-viewer.html?old=${selectedOld.image}&new=${selectedNew.image}`;
            }
        }

        // Initialization
        document.addEventListener('DOMContentLoaded', () => {
            const mapsContainer = document.getElementById('maps-container');

            maps.forEach(map => {
                mapsContainer.appendChild(createMapCard(map));
            });

            document.getElementById('compare-btn').addEventListener('click', startCompare);

            // Check URL parameters (if opened with ?old=...&new=...)
            const params = new URLSearchParams(window.location.search);
            const oldParam = params.get('old');
            const newParam = params.get('new');

            if (oldParam || newParam) {
                // Maps already selected - redirect to comparison
                window.location.href = 'diff-viewer.html' + window.location.search;
            }
        });
    </script>
</body>
</html>
